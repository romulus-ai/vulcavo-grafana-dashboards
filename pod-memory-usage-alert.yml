apiVersion: 1
groups:
  - orgId: 1
    name: everyMinute
    folder: default-alerts
    interval: 1m
    rules:
      - uid: cfgefss6kyiv4e
        title: High Pod Memory Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: |-
                100 *
                sum by (cluster, namespace, pod) (
                  container_memory_working_set_bytes{}
                )
                /
                sum by (cluster, namespace, pod) (
                  kube_pod_container_resource_limits{}
                  and on (cluster, namespace, pod)
                  max by (cluster, namespace, pod) (
                    kube_pod_status_phase{
                      phase="Running"
                    } == 1
                  )
                )
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 90
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: Some Pods are using much more Memory than requested
        labels: {}
        isPaused: false
        notification_settings:
          receiver: grafana-default-email
